runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2
outputFiles:
  - '.next/**'
  - 'public/**'
  - 'package.json'
  - 'next.config.ts'
env:
  - variable: NEXT_PUBLIC_SANITY_PROJECT_ID
    value: "26yfbug4"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SANITY_DATASET
    value: "production"
    availability:
      - BUILD
      - RUNTIME
