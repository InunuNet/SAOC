    <script>
      // TWEAKS default state
      window.SAOC_TWEAKS = /*EDITMODE-BEGIN*/ {
        serif: 'crimson',
        density: 'generous',
      } /*EDITMODE-END*/;

      window.__applyTweaks = function (t) {
        document.documentElement.setAttribute('data-density', t.density || 'generous');
        const serifMap = {
          crimson: { font: 'var(--serif-crimson)', weight: 500 },
          playfair: { font: 'var(--serif-playfair)', weight: 500 },
          cormorant: { font: 'var(--serif-cormorant)', weight: 500 },
          fraunces: { font: 'var(--serif-fraunces)', weight: 500 },
          eb: { font: 'var(--serif-eb)', weight: 500 },
        };
        const choice = serifMap[t.serif] || serifMap.crimson;
        document.documentElement.style.setProperty('--serif', choice.font);
        document.documentElement.style.setProperty('--serif-weight', choice.weight);
      };
      window.__applyTweaks(window.SAOC_TWEAKS);
    </script>
