# Athanor Harness — Update Manifest
# Classifies every workspace path into one of four categories:
#   HARNESS  — owned by harness template; safe to overwrite on update
#   WORKSPACE — owned by the project; never touched by update
#   DERIVED  — regenerated by make sync; skip during update
#   MERGE    — requires merge strategy (not whole-file overwrite)
schema: athanor.manifest/v1
created_at: 2026-05-12

paths:
  # HARNESS — harness-owned, safe to overwrite
  - path: 'execution/'
    category: HARNESS
  - category: HARNESS
    comment: 'Backlog trimming utility — prunes stale entries from .agent/memory/project/backlog.md'
    path: execution/backlog_trim.py
  - path: '.agent/agents/'
    category: HARNESS
  - path: '.agent/rules/'
    category: HARNESS
  - path: '.agent/skills/'
    category: HARNESS
  - path: '.agent/workflows/'
    category: HARNESS
  - path: 'template/'
    category: HARNESS
  - path: 'init.sh'
    category: HARNESS
  - path: 'Makefile'
    category: HARNESS

  # WORKSPACE — project-owned, never overwrite
  - path: '.agent/memory/project/'
    category: WORKSPACE
  - path: '.agent/memory/brain/'
    category: WORKSPACE
  - path: '.agent/identity/'
    category: WORKSPACE
  - path: '.agent/profile.json'
    category: WORKSPACE
  - path: '.agent/no-update'
    category: WORKSPACE
  - path: 'WORKSPACE'
    category: WORKSPACE

  # HARNESS — Claude Code agent persona files (non-destructive; sync_agents.sh only creates missing)
  - path: '.claude/agents/'
    category: HARNESS
    comment: 'Claude Code agent persona files — enables subagent_type dispatch'

  # DERIVED — regenerated by make sync
  - path: '.claude/skills/'
    category: DERIVED
  - path: '.gemini/agents/'
    category: DERIVED
  - path: '.gemini/skills/'
    category: DERIVED

  # MERGE — requires merge strategy
  - path: '.gitignore'
    category: MERGE
    strategy: line_union
  - path: '.claude/settings.json'
    category: MERGE
    strategy: json_deep_merge
  - path: '.gemini/settings.json'
    category: MERGE
    strategy: json_deep_merge
  - path: '.gemini/policies/autonomy.toml'
    category: HARNESS
    comment: 'Gemini autonomy policy — controls what agents can do without confirmation'
