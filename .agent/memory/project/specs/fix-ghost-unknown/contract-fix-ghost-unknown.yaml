schema: athanor.contract/v1
feature: F1
spec: fix-ghost-unknown
name: Fix phantom ghost-unknown mission — guard failure_router against malformed JSON slugs
created_at: '2026-06-13T00:00:00Z'

assertions:
  - id: F1-01
    description: failure_router.sh default for suite_slug is empty string (not "unknown")
    verify:
      kind: file_contains
      path: execution/failure_router.sh
      pattern: 'get_json_field "$json_file" "suite_slug" ""'

  - id: F1-02
    description: failure_router.sh logs warning and skips when slug is empty
    verify:
      kind: file_contains
      path: execution/failure_router.sh
      pattern: 'missing suite_slug field'

  - id: F1-03
    description: failure_router.sh skips when ghost project directory does not exist
    verify:
      kind: file_contains
      path: execution/failure_router.sh
      pattern: 'ghost project directory does not exist'

  - id: F1-05
    description: phantom mission frontmatter is marked done (not active)
    verify:
      kind: file_contains
      path: .agent/memory/project/missions/2026-06-12-fix-ghost-unknown.md
      pattern: 'status: done'
