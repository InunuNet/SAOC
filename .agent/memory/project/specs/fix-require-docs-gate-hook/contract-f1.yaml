      command: 'echo ''{"tool_code":"Bash","tool_name":"Bash","tool_input":{"command":"python3 execution/contract.py gate"}}'' | python3 execution/hooks/require_docs.sh && exit 1 || exit 0' # Hook should exit non-zero (trigger)
    - id: A3
      description: "require_docs.sh should trigger for 'python3 execution/contract.py gate --phase all'"
      command: 'echo ''{"tool_code":"Bash","tool_name":"Bash","tool_input":{"command":"python3 execution/contract.py gate --phase all"}}'' | python3 execution/hooks/require_docs.sh && exit 1 || exit 0' # Hook should exit non-zero (trigger)
