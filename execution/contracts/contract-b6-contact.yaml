spec: saoc-full-platform
goal: 'B6: Contact page. Add contactPageQuery to sanity/queries.ts fetching title + directContacts[]{name, role, email} ONLY (must NOT project formRecipients — that would leak admin recipient emails to the client bundle). Rebuild app/(marketing)/contact/page.tsx as an async Server Component fetching contactPageQuery and rendering a two-column layout: a Sanity-driven directContacts sidebar (left) and the ContactForm island (right). Create components/contact/ContactForm.tsx (use client) — controlled form with name/email/subject/message fields + hidden honeypot _hp, posting JSON to /api/contact, with an idle → submitting → success | error state machine, inline API error display, and a Thank-you success state replacing the form. Create components/contact/index.ts barrel. Static fallback to a "info@saoc.co.za" SAOC Secretariat contact when Sanity returns null. Revalidation tags [contact, sanity]. No changes to app/api/contact/route.ts.'
created_at: '2026-06-12'
autonomy: high
status: done
phase: 1

