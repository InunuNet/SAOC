schema: athanor.contract/v1
slug: saoc-b7-sponsors
spec: saoc-full-platform
goal: 'B7: Sponsors page. Create app/(marketing)/sponsors/page.tsx as an async Server Component (no use client) fetching the existing partnersQuery from sanity/queries.ts with revalidation tags [sponsor, sanity]. Group sponsors server-side by tier using a TIER_ORDER constant [Title, Gold, Silver, Supporting] (the query orders alphabetically by tier, which is the WRONG display order — must re-sort at render). Create components/sponsors/SponsorGrid.tsx (Server Component; defines + exports the inline SanitySponsor interface; groups via reduce into Record<string, SanitySponsor[]> and iterates TIER_ORDER; renders per-tier heading + sponsor cards with logo via urlFor(sponsor.logo).width(200).url() guarded by {sponsor.logo && ...}, name, description, and external website link with target=_blank rel=noopener noreferrer) and components/sponsors/index.ts barrel. Static fallback: when partnersQuery returns null or empty, render a Become our first sponsor CTA section instead of the grid. Page ends with a Become a sponsor CTA linking to /contact. urlFor is imported from @/sanity/lib/image. No new queries, no new dependencies, no invented brand tokens, no [Placeholder string.'
created_at: '2026-06-12'
autonomy: high
status: done
phase: 1

features:
  - id: B7
    name: 'Sponsors page (partnersQuery reuse, async Server Component, tier-grouped SponsorGrid, urlFor logos, become-a-sponsor CTA, empty-state fallback)'
