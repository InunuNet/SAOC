schema: athanor.contract/v1
slug: autonomy-sync-1274
goal: "Propagate autonomy=high to gemini-cli policy file via sync-autonomy. Move sync logic to execution/sync_autonomy.py. Add auto-sync call to set-autonomy."
created_at: "2026-06-28"
autonomy: high

assertions:
  - id: P1A1
    description: "sync_autonomy.py exists and imports cleanly"
    verify:
      kind: shell
      cmd: 'python3 -c "import sys; sys.path.insert(0,\"execution\"); import sync_autonomy" 2>/dev/null || python3 execution/sync_autonomy.py --help 2>/dev/null; test -f execution/sync_autonomy.py'
  - id: P1A2
    description: "gemini-cli provider has supports_policy_sync: true"
    verify:
      kind: shell
      cmd: 'python3 -c "import json; d=json.load(open(\".agent/providers/gemini-cli.json\")); assert d[\"autonomy\"][\"supports_policy_sync\"] == True"'
  - id: P1A3
    description: "gemini-cli max_honerable_level updated to high"
    verify:
      kind: shell
      cmd: 'python3 -c "import json; d=json.load(open(\".agent/providers/gemini-cli.json\")); assert d[\"autonomy\"][\"max_honerable_level\"] == \"high\""'
  - id: P2A1
    description: "sync-autonomy Makefile target calls sync_autonomy.py"
    verify:
      kind: shell
      cmd: 'grep -q "sync_autonomy.py" Makefile'
  - id: P2A2
    description: "set-autonomy calls sync-autonomy after updating profile"
    verify:
      kind: shell
      cmd: 'grep -A20 "^set-autonomy:" Makefile | grep -q "sync-autonomy"'
  - id: P3A1
    description: "make sync-autonomy runs without error at level=high"
    verify:
      kind: shell
      cmd: 'python3 execution/sync_autonomy.py 2>&1 | grep -q "sync-autonomy: current level=high"'
  - id: P3A2
    description: "autonomy.toml updated to high policy (allow all shell)"
    verify:
      kind: shell
      cmd: 'grep -q "High autonomy" .gemini/policies/autonomy.toml'
  - id: P3A3
    description: "boot mismatch count drops (gemini-cli no longer a mismatch)"
    verify:
      kind: shell
      cmd: 'test "$(python3 execution/sync_autonomy.py 2>&1 | grep -v "OK\|sync-autonomy\|wrote\|complete" | grep -v "^$" | grep "gemini-cli" | wc -l | tr -d " ")" = "0"'

phases:
  - id: 1
    assertions: [P1A1, P1A2, P1A3]
  - id: 2
    assertions: [P2A1, P2A2]
  - id: 3
    assertions: [P3A1, P3A2, P3A3]
