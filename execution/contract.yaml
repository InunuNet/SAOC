schema: athanor.contract/v1
slug: fleet-loop-mission-driven
goal: "Fix fleet_loop.sh: replace comms-directive prompt with mission-driven prompt; extend idle hash to include open backlog count"
created_at: '2026-06-25'
autonomy: high
architect: "@architect"

description: |
  fleet_loop.sh enqueues work tickets for fleet projects, but its current
  embedded prompt tells agents to "find a Codi directive in comms.md" —
  directives Athanor can never write (scope.md blocks cross-project writes).
  Fleet agents find nothing and exit.

  Fix 1 (F1): replace the PROMPT heredoc with a self-sufficient mission-loop
  prompt that tells fleet agents to check their own active mission or open
  backlog and run the full chain autonomously.

  Fix 2 (F2): extend the idle-detection hash (which currently skips projects
  when comms + active_json haven't changed) to also include the count of open
  backlog items (grep '^- \[ \]') so projects with work but no directive still
  get triggered.

features:
  - id: F1
    name: "Replace comms-directive PROMPT heredoc with mission-driven prompt"
    status: pending
  - id: F2
    name: "Add open-backlog-item count to idle-detection hash"
    status: pending

goldens:
  - .agent/memory/project/specs/fleet-loop-mission-driven/goldens/fleet_loop_fixed.sh

assertions:
  phase: 4
  checks:
    - id: A1
      description: "Prompt no longer references 'CODI -> YOU' directive lookup"
      command: "python3 -c \"src=open('.agent/pulse/registry/fleet_loop.sh').read(); assert 'CODI -> YOU' not in src and 'CODI -> ALL' not in src, 'old directive pattern still present'; print('ok')\""
    - id: A2
      description: "Prompt includes mission resume step"
      command: "grep -q 'mission.py resume' .agent/pulse/registry/fleet_loop.sh && echo ok"
    - id: A3
      description: "Prompt includes backlog fallback when no active mission"
      command: "grep -q 'backlog' .agent/pulse/registry/fleet_loop.sh && echo ok"
    - id: A4
      description: "Prompt tells fleet agent to run full chain autonomously"
      command: "grep -qE 'architect.*dev.*qa|mandatory chain|full chain' .agent/pulse/registry/fleet_loop.sh && echo ok"
    - id: A5
      description: "Idle hash includes open backlog count variable"
      command: "grep -q 'open_count' .agent/pulse/registry/fleet_loop.sh && echo ok"
    - id: A6
      description: "Idle hash printf includes open_count (3 variables, not 2)"
      command: "python3 -c \"src=open('.agent/pulse/registry/fleet_loop.sh').read(); import re; m=re.search(r'printf.*shasum', src, re.S); assert m and 'open_count' in m.group(0), 'open_count not in hash printf'; print('ok')\""
    - id: A7
      description: "Cadence guard (6h MIN_INTERVAL) still present and unchanged"
      command: "grep -q 'MIN_INTERVAL' .agent/pulse/registry/fleet_loop.sh && grep -q '21600' .agent/pulse/registry/fleet_loop.sh && echo ok"
    - id: A8
      description: "PROJECTS array unchanged (same 4 entries: DEX, EVE, SAOC, GEMINI)"
      command: "grep -q 'DEX' .agent/pulse/registry/fleet_loop.sh && grep -q 'EVE' .agent/pulse/registry/fleet_loop.sh && grep -q 'SAOC' .agent/pulse/registry/fleet_loop.sh && grep -q 'GEMINI' .agent/pulse/registry/fleet_loop.sh && echo ok"
    - id: A9
      description: "fleet_loop.sh passes bash syntax check"
      command: "bash -n .agent/pulse/registry/fleet_loop.sh && echo syntax-ok"
