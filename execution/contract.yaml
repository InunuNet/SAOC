schema: athanor.contract/v1
slug: backlog-trim-manifest-fleet
goal: Ship execution/backlog_trim.py to downstream workspaces via the fleet update manifest and template.
created_at: '2026-06-11'
autonomy: high
architect: "@architect"

description: |
  backlog_trim.py exists in execution/ but is NOT covered by an explicit HARNESS
  record in .agent/update-manifest.yaml, so the missing-file backstop in
  update_template.py never ships it to same-version downstream workspaces. There
  is also no template/execution/backlog_trim.py for it to ship FROM. This task
  adds the explicit manifest record and the byte-identical template copy so
  `make update-template` delivers backlog_trim.py to the fleet.

  @dev touches EXACTLY two files:
    1. .agent/update-manifest.yaml  — add an explicit HARNESS record for
       execution/backlog_trim.py under the `paths:` list, following the existing
       category/comment/path ordering used by execution/mission.py.
       Record MUST have category: HARNESS, a non-empty comment:, and
       path: execution/backlog_trim.py.
    2. template/execution/backlog_trim.py — create as a byte-for-byte copy of
       execution/backlog_trim.py (cp, no edits).

  No version bump. No edits to backlog_trim.py logic. No other files.

features:
  - id: F1
    name: "Add explicit HARNESS manifest record + byte-identical template copy for backlog_trim.py"
    status: pending

goldens: []

assertions:
  phase: 4
  checks:
    - id: A1
      description: "Manifest references execution/backlog_trim.py"
      command: 'grep -q "execution/backlog_trim.py" .agent/update-manifest.yaml'
    - id: A2
      description: "A HARNESS-categorized record sits adjacent to the backlog_trim.py path (category then path within a 3-line window)"
      command: 'grep -A2 "category: HARNESS" .agent/update-manifest.yaml | grep -q "path: execution/backlog_trim.py"'
    - id: A3
      description: "Template copy exists at template/execution/backlog_trim.py"
      command: 'test -f template/execution/backlog_trim.py'
    - id: A4
      description: "Template copy is byte-identical to the source"
      command: 'diff execution/backlog_trim.py template/execution/backlog_trim.py'
    - id: A5
      description: "The backlog_trim.py record carries a non-empty comment: field adjacent to its path"
      command: 'grep -B2 "path: execution/backlog_trim.py" .agent/update-manifest.yaml | grep -Eq "comment: *.?[^ ].*"'
