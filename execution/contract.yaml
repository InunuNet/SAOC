schema: athanor.contract/v1
slug: autonomy-propagation
goal: "Add autonomy capability fields to provider manifests; upgrade sync-autonomy; add AUTONOMY MISMATCH boot warning"
created_at: '2026-06-23'
autonomy: high
architect: "@architect"

description: |
  Fix #1274: provider manifests have no machine-readable autonomy capability fields.
  sync-autonomy is a v1 stub that only reads/displays level.
  Boot does not warn when provider cannot honor the current autonomy level.

features:
  - id: F1
    name: "Add autonomy capability fields to all provider manifests (root + template)"
    status: pending
  - id: F2
    name: "Upgrade sync-autonomy Makefile target to report per-provider mismatch"
    status: pending
  - id: F3
    name: "Add AUTONOMY MISMATCH warning to full_boot.sh (root + template)"
    status: pending

goldens:
  - .agent/memory/project/specs/autonomy-propagation/goldens.md

assertions:
  phase: 4
  checks:
    - id: A1
      description: "All 5 root provider manifests have autonomy.supports_policy_sync field"
      command: "python3 -c \"import json,pathlib,sys; ps=list(pathlib.Path('.agent/providers').glob('*.json')); bad=[p.name for p in ps if 'autonomy' not in json.loads(p.read_text()) or 'supports_policy_sync' not in json.loads(p.read_text())['autonomy']]; sys.exit(1) if bad else print('ok')\""
    - id: A2
      description: "All 5 template provider manifests have autonomy.supports_policy_sync field"
      command: "python3 -c \"import json,pathlib,sys; ps=list(pathlib.Path('template/.agent/providers').glob('*.json')); bad=[p.name for p in ps if 'autonomy' not in json.loads(p.read_text()) or 'supports_policy_sync' not in json.loads(p.read_text())['autonomy']]; sys.exit(1) if bad else print('ok')\""
    - id: A3
      description: "Root and template provider manifests are byte-identical per provider"
      command: "bash -c 'for f in .agent/providers/*.json; do diff \"$f\" \"template/$f\" || { echo MISMATCH:$f; exit 1; }; done; echo all-identical'"
    - id: A4
      description: "claude-code.json supports_policy_sync=true, max_honerable_level=loop"
      command: "python3 -c \"import json,pathlib; a=json.loads(pathlib.Path('.agent/providers/claude-code.json').read_text())['autonomy']; assert a['supports_policy_sync']==True and a['max_honerable_level']=='loop'; print('ok')\""
    - id: A5
      description: "sync-autonomy Makefile target contains MISMATCH detection logic"
      command: "grep -q 'AUTONOMY MISMATCH' Makefile"
    - id: A6
      description: "sync-autonomy reads max_honerable_level from provider manifests"
      command: "grep -q 'max_honerable_level' Makefile"
    - id: A7
      description: "full_boot.sh contains AUTONOMY MISMATCH warning block"
      command: "grep -q 'AUTONOMY MISMATCH' execution/hooks/full_boot.sh"
    - id: A8
      description: "template/execution/hooks/full_boot.sh byte-identical to execution/hooks/full_boot.sh"
      command: "diff execution/hooks/full_boot.sh template/execution/hooks/full_boot.sh"
    - id: A9
      description: "autonomy warning suppressed when level is medium or below (grep for suppression guard)"
      command: "grep -qE 'off\\|low\\|medium' execution/hooks/full_boot.sh"
