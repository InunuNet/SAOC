schema: athanor.contract/v1
slug: hook-graceful-degradation
goal: "Wrap every execution/hooks/*.sh hook command with [ -f ] guard so missing scripts degrade silently instead of erroring"
created_at: '2026-06-25'
autonomy: high
architect: "@architect"

description: |
  .claude/settings.json and template/.claude/settings.json reference 19 execution/hooks/*.sh
  scripts across 23 hook command entries. When any script is absent (e.g. after execution/
  is deleted), bash exits 127 and emits "No such file or directory" on every tool call.

  Fix: wrap every "bash execution/hooks/<name>.sh" command with:
    [ -f execution/hooks/<name>.sh ] && bash execution/hooks/<name>.sh || exit 0

  Fail-open (exit 0 when missing) is correct: if harness is removed, blocking tools
  makes workspace unusable. || exit 0 is required because [ -f ] returns exit 1
  when file missing, which PreToolUse hooks interpret as "block."

features:
  - id: F1
    name: "Wrap all bare 'bash execution/hooks/*.sh' commands with [ -f ] && ... || exit 0"
    status: pending

goldens:
  - .agent/memory/project/specs/hook-graceful-degradation/goldens/settings_fixed.json
  - .agent/memory/project/specs/hook-graceful-degradation/goldens/template_settings_fixed.json

assertions:
  phase: 4
  checks:
    - id: A1
      description: "No bare 'bash execution/hooks/' commands remain (all wrapped with [ -f ] guard)"
      command: "python3 -c \"import json,re; s=json.dumps(json.load(open('.claude/settings.json'))); bare=re.findall(r'\\\"bash execution/hooks/', s); assert len(bare)==0, f'{len(bare)} bare bash execution/hooks/ commands remain'; print('ok')\""
    - id: A2
      description: "At least 19 [ -f execution/hooks/ ] guards present in settings.json"
      command: "python3 -c \"import json,re; s=json.dumps(json.load(open('.claude/settings.json'))); guards=re.findall(r'\\[ -f execution/hooks/', s); assert len(guards)>=19, f'Only {len(guards)} guards found, expected >=19'; print(f'ok: {len(guards)} guards')\""
    - id: A3
      description: "settings.json is valid JSON"
      command: "python3 -c \"import json; json.load(open('.claude/settings.json')); print('valid json')\""
    - id: A4
      description: "template/.claude/settings.json is byte-identical to .claude/settings.json"
      command: "diff .claude/settings.json template/.claude/settings.json && echo identical"
    - id: A5
      description: "All || exit 0 fallbacks present (same count as guards)"
      command: "python3 -c \"import json,re; s=json.dumps(json.load(open('.claude/settings.json'))); guards=len(re.findall(r'\\[ -f execution/hooks/', s)); exits=len(re.findall(r'\\|\\| exit 0', s)); assert guards==exits, f'guards={guards} exits={exits} mismatch'; print(f'ok: {guards} guards = {exits} exits')\""
    - id: A6
      description: "PreCompact inline hooks unchanged (still contain input=$(cat))"
      command: "python3 -c \"import json; s=json.dumps(json.load(open('.claude/settings.json'))); assert 'input=$(cat)' in s, 'PreCompact inline hook lost'; print('ok')\""
    - id: A7
      description: "Guard exits 0 when script path does not exist"
      command: "bash -c '[ -f execution/hooks/__nonexistent__.sh ] && bash execution/hooks/__nonexistent__.sh || exit 0' && echo ok"
    - id: A8
      description: "Hook count unchanged (no hooks added or removed, only commands wrapped)"
      command: "python3 -c \"import json; s=json.load(open('.claude/settings.json')); total=sum(len(h.get('hooks',[])) for hlist in s.get('hooks',{}).values() for h in hlist); assert total>=23, f'Hook count dropped to {total}'; print(f'ok: {total} hooks')\""
