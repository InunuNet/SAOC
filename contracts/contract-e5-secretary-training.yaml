schema: athanor.contract/v1
feature: E5
spec: e5-secretary-training
name: Phase E — Secretary & Admin CMS Training Guide
created_at: '2026-06-13'

# SCOPE: Non-technical CMS training documentation for the SAOC Secretary and
# designated web administrator. Covers Sanity Studio login, all content types
# (Events, Societies, National Show, Shows, Judges, Board Members, Sponsors,
# Home Page, About Page, Contact Page, Judging Page), image upload best practice,
# draft vs publish workflow, and troubleshooting.

assertions:
  # ---- 1: File exists ----
  - id: E5-01
    description: docs/secretary-cms-guide.md exists
    verify:
      kind: file_exists
      path: docs/secretary-cms-guide.md

  # ---- 2: Required sections present ----
  - id: E5-02
    description: guide has a Logging In section
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Logging In'

  - id: E5-03
    description: guide has a Studio Overview section
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Studio Overview'

  - id: E5-04
    description: guide covers Adding an Event
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Adding an Event'

  - id: E5-05
    description: guide covers Adding a Society
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Adding a Society'

  - id: E5-06
    description: guide covers the National Show countdown
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'National Show'

  - id: E5-07
    description: guide covers Judges or Judges Directory
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Judge'

  - id: E5-08
    description: guide covers Board Members
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Board Member'

  - id: E5-09
    description: guide covers Sponsors
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Sponsor'

  - id: E5-10
    description: guide covers image upload best practice
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Image'

  - id: E5-11
    description: guide covers Publish vs Draft workflow
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Publish vs Draft'

  - id: E5-12
    description: guide has a Troubleshooting section
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'Troubleshooting'

  - id: E5-13
    description: guide includes webmaster contact details
    verify:
      kind: file_contains
      path: docs/secretary-cms-guide.md
      text: 'brad@inunu.net'

  # ---- 3: SPF/DKIM/DMARC setup guide ----
  - id: E5-14
    description: docs/email-dns-setup.md exists for DNS handover
    verify:
      kind: file_exists
      path: docs/email-dns-setup.md

  - id: E5-15
    description: email DNS guide covers SPF
    verify:
      kind: file_contains
      path: docs/email-dns-setup.md
      text: 'SPF'

  - id: E5-16
    description: email DNS guide covers DKIM
    verify:
      kind: file_contains
      path: docs/email-dns-setup.md
      text: 'DKIM'

  - id: E5-17
    description: email DNS guide covers DMARC
    verify:
      kind: file_contains
      path: docs/email-dns-setup.md
      text: 'DMARC'

  # ---- 4: Guide quality check ----
  - id: E5-18
    description: guide is at least 200 lines (comprehensive)
    verify:
      kind: shell
      cmd: 'test $(wc -l < docs/secretary-cms-guide.md) -ge 200'

  # ---- Gate assertions ----
  - id: E5-GATE-01
    description: build still passes with training docs in tree
    verify:
      kind: shell
      cmd: 'pnpm build --no-lint 2>&1 | tail -3 | grep -E "Route|Page|compiled successfully|Generating static|Finalizing|Build"'

phases:
  - id: 1
    assertions:
      - E5-01
      - E5-02
      - E5-03
      - E5-04
      - E5-05
      - E5-06
      - E5-07
      - E5-08
      - E5-09
      - E5-10
      - E5-11
      - E5-12
      - E5-13
      - E5-14
      - E5-15
      - E5-16
      - E5-17
      - E5-18
      - E5-GATE-01
