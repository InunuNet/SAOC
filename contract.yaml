mission: inner-pages-design-polish
version: "1.0"
description: >
  Centre-align PageHero content and switch About hero to orchid-violet.jpg.
  @dev implements each file to byte-match its golden in .agent/golden/.
goldens:
  - .agent/golden/components/ui/PageHero.tsx
  - ".agent/golden/app/(marketing)/about/page.tsx"
assertions:
  phase: 1
  checks:
    # ---------- F1 — PageHero centering ----------
    - id: A1
      description: "F1: PageHero byte-matches golden"
      command: "diff -u '.agent/golden/components/ui/PageHero.tsx' components/ui/PageHero.tsx"
    - id: A2
      description: "F1: inner content div has flex flex-col items-center text-center"
      command: "grep -q 'flex flex-col items-center text-center' components/ui/PageHero.tsx"
    - id: A3
      description: "F1: section retains items-end (text bottom-pinned, centred horizontally)"
      command: "grep -q 'flex items-end overflow-hidden' components/ui/PageHero.tsx"

    # ---------- F2 — About orchid-violet ----------
    - id: A4
      description: "F2: About page byte-matches golden"
      command: "diff -u '.agent/golden/app/(marketing)/about/page.tsx' 'app/(marketing)/about/page.tsx'"
    - id: A5
      description: "F2: About page uses orchid-violet.jpg"
      command: "grep -q 'orchid-violet.jpg' 'app/(marketing)/about/page.tsx'"
    - id: A6
      description: "F2: About page no longer uses orchid-dark.jpg"
      command: "! grep -q 'orchid-dark.jpg' 'app/(marketing)/about/page.tsx'"

    # ---------- F3 — National Show verify-only ----------
    - id: A7
      description: "F3: National Show page has a scrim overlay div"
      command: "grep -q 'absolute inset-0' 'app/(marketing)/national-show/page.tsx'"
    - id: A8
      description: "F3: National Show page has tracking- eyebrow element"
      command: "grep -q 'tracking-' 'app/(marketing)/national-show/page.tsx'"

    # ---------- F4 — Other inner pages ----------
    - id: A9
      description: "F4: Societies page uses PageHero"
      command: "grep -q 'PageHero' 'app/(marketing)/societies/page.tsx'"
    - id: A10
      description: "F4: Judging page uses PageHero"
      command: "grep -q 'PageHero' 'app/(marketing)/judging/page.tsx'"
    - id: A11
      description: "F4: Events page uses PageHero"
      command: "grep -q 'PageHero' 'app/(marketing)/events/page.tsx'"
    - id: A12
      description: "F4: Contact page uses PageHero"
      command: "grep -q 'PageHero' 'app/(marketing)/contact/page.tsx'"

    # ---------- F5 — Build verification ----------
    - id: A13
      description: "F5: pnpm build exits 0 (no TypeScript or compilation errors)"
      command: "pnpm build"
